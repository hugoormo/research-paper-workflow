name: Build Papers

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install LaTeX and Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-lang-german texlive-xetex pandoc

      - name: Build PDFs from LaTeX sources
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p docs/paper-latex/export
          files=(docs/paper-latex/*.tex)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .tex files found under docs/paper-latex"
            exit 0
          fi

          for tex in "${files[@]}"; do
            echo "Building PDF: $tex"
            tex_dir=$(dirname "$tex")
            tex_file=$(basename "$tex")
            base=$(basename "$tex" .tex)
            pushd "$tex_dir" >/dev/null
            latexmk -xelatex -interaction=nonstopmode -halt-on-error -file-line-error -outdir=build -auxdir=build "$tex_file"
            if [ -f "build/${base}.pdf" ]; then
              cp "build/${base}.pdf" "export/${base}.pdf"
            fi
            popd >/dev/null
          done

      - name: Optional DOCX export with Pandoc
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p docs/paper-latex/export
          files=(docs/paper-latex/*.tex)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .tex files found under docs/paper-latex"
            exit 0
          fi

          for tex in "${files[@]}"; do
            base=$(basename "$tex" .tex)
            out="docs/paper-latex/export/${base}.docx"
            echo "Exporting DOCX: $tex -> $out"
            if pandoc "$tex" -o "$out" --from=latex --to=docx; then
              echo "DOCX export for $base succeeded"
            else
              echo "DOCX export for $base failed; continuing"
            fi
          done

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v5
        with:
          name: papers-pdf
          path: docs/paper-latex/export/*.pdf
          if-no-files-found: warn

      - name: Upload DOCX artifacts
        uses: actions/upload-artifact@v5
        with:
          name: papers-docx
          path: docs/paper-latex/export/*.docx
          if-no-files-found: warn
