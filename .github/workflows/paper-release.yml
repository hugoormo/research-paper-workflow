name: Release Papers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install LaTeX and Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-lang-german texlive-xetex texlive-bibtex-extra pandoc zip

      - name: Build PDFs from LaTeX sources
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p docs/paper-latex/export
          files=(docs/paper-latex/*.tex)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .tex files found under docs/paper-latex"
            exit 0
          fi

          for tex in "${files[@]}"; do
            echo "Building PDF: $tex"
            tex_dir=$(dirname "$tex")
            tex_file=$(basename "$tex")
            base=$(basename "$tex" .tex)
            pushd "$tex_dir" >/dev/null
            latexmk -xelatex -interaction=nonstopmode -halt-on-error -file-line-error -outdir=build -auxdir=build "$tex_file"
            if [ -f "build/${base}.pdf" ]; then
              cp "build/${base}.pdf" "export/${base}.pdf"
            fi
            popd >/dev/null
          done

      - name: Optional DOCX export with Pandoc
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p docs/paper-latex/export
          files=(docs/paper-latex/*.tex)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .tex files found under docs/paper-latex"
            exit 0
          fi

          for tex in "${files[@]}"; do
            base=$(basename "$tex" .tex)
            out="docs/paper-latex/export/${base}.docx"
            echo "Exporting DOCX: $tex -> $out"
            if pandoc "$tex" -o "$out" --from=latex --to=docx; then
              echo "DOCX export for $base succeeded"
            else
              echo "DOCX export for $base failed; continuing"
            fi
          done

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          shopt -s nullglob
          pdfs=(docs/paper-latex/export/*.pdf)
          docxs=(docs/paper-latex/export/*.docx)

          if [ ${#pdfs[@]} -gt 0 ]; then
            zip -j release-assets/papers-pdf-${GITHUB_REF_NAME}.zip "${pdfs[@]}"
          fi

          if [ ${#docxs[@]} -gt 0 ]; then
            zip -j release-assets/papers-docx-${GITHUB_REF_NAME}.zip "${docxs[@]}"
          fi

      - name: Create or update release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          # Check if release exists
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME exists. Uploading assets..."
            for asset in release-assets/*; do
              if [ -f "$asset" ]; then
                gh release upload "$GITHUB_REF_NAME" "$asset" --clobber
              fi
            done
          else
            echo "Creating release $GITHUB_REF_NAME with assets..."
            # Collect all assets into an array
            assets=()
            for asset in release-assets/*; do
              if [ -f "$asset" ]; then
                assets+=("$asset")
              fi
            done
            
            # Create release with assets
            if [ ${#assets[@]} -gt 0 ]; then
              gh release create "$GITHUB_REF_NAME" \
                --title "Paper Release $GITHUB_REF_NAME" \
                --notes "Automated paper artifacts (PDF and optional DOCX) for $GITHUB_REF_NAME." \
                "${assets[@]}"
            else
              gh release create "$GITHUB_REF_NAME" \
                --title "Paper Release $GITHUB_REF_NAME" \
                --notes "Automated paper artifacts (PDF and optional DOCX) for $GITHUB_REF_NAME."
            fi
          fi
